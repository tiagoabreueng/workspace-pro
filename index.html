<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Pro - Enterprise Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ===== ESTILOS GLOBAIS (mantidos do original) ===== */
        * { font-family: 'Figtree', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        .dark .custom-scroll::-webkit-scrollbar-track { background: #1e1e2e; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background: #444; }
        
        .resizable-container { display: flex; height: 100%; position: relative; }
        .sidebar-resizable {
            position: relative;
            min-width: 180px;
            max-width: 400px;
            width: 240px;
            background: white;
            height: 100%;
            overflow-y: auto;
        }
        .dark .sidebar-resizable { background: #181829; }
        @media (min-width: 769px) {
            .sidebar-resizable { position: relative !important; left: 0 !important; display: flex !important; }
            .menu-toggle, .mobile-overlay, .bottom-nav { display: none !important; }
        }
        @media (max-width: 768px) {
            .sidebar-resizable {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100vh;
                z-index: 1000;
                transition: left 0.3s ease;
                box-shadow: 4px 0 20px rgba(0,0,0,0.1);
            }
            .sidebar-resizable.open { left: 0; }
            .mobile-overlay {
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.5);
                z-index: 999;
                display: none;
            }
            .mobile-overlay.open { display: block; }
            .menu-toggle { display: block; cursor: pointer; }
            .desktop-nav { display: none; }
            .bottom-nav { display: flex; }
            .resize-handle { display: none; }
        }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            z-index: 100;
            padding: 8px 16px;
            justify-content: space-around;
            align-items: center;
            display: none;
        }
        .dark .bottom-nav { background: #181829; border-color: #2d2d3f; }
        .bottom-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 6px 12px;
            border-radius: 30px;
            min-width: 60px;
            color: #64748b;
        }
        .bottom-nav-item.active { background: #e6f0ff; color: #0073ea; }
        .bottom-nav-item span:first-child { font-size: 22px; }
        .bottom-nav-item span:last-child { font-size: 10px; font-weight: 600; }
        
        .process-card {
            background: white;
            border-radius: 20px;
            padding: 18px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .dark .process-card { background: #181829; border-color: #2d2d3f; }
        .process-card:hover { transform: translateY(-2px); box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .processos-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        @media (min-width: 640px) { .processos-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (min-width: 1024px) { .processos-grid { grid-template-columns: repeat(3, 1fr); } }
        
        .progress-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0073ea; border-radius: 3px; transition: width 0.3s ease; }
        
        .status-tag-overdue { background: #fb275d20; color: #fb275d; border-left: 3px solid #fb275d; }
        .status-tag-today { background: #ffad0020; color: #ffad00; border-left: 3px solid #ffad00; }
        .status-tag-week { background: #0073ea20; color: #0073ea; border-left: 3px solid #0073ea; }
        .priority-badge { font-size: 10px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        
        .login-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
            backdrop-filter: blur(5px);
            padding: 16px;
        }
        .login-box {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
        }
        .dark .login-box { background: #181829; border: 1px solid #2d2d3f; }
        
        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 16px;
        }
        .user-item.selected { border-color: #0073ea; background: #e6f0ff; }
        
        .current-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px 6px 6px;
            background: #f1f5f9;
            border-radius: 40px;
            cursor: pointer;
        }
        .dark .current-user { background: #1e1e2e; }
        
        .btn-primary { background: #0073ea; color: white; padding: 12px 24px; border-radius: 40px; font-weight: 600; text-align: center; }
        .btn-outline { background: transparent; border: 2px solid #e2e8f0; padding: 10px 20px; border-radius: 40px; font-weight: 600; }
        .dark .btn-outline { border-color: #2d2d3f; color: #e2e8f0; }
        
        .resize-handle {
            position: absolute;
            right: -3px;
            top: 0;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            background: transparent;
            z-index: 100;
        }
        .resize-handle:hover { background: #0073ea; }
        
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
            padding: 16px;
        }
        .modal-content {
            background: white;
            border-radius: 28px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 24px;
        }
        .dark .modal-content { background: #181829; border: 1px solid #2d2d3f; }
        
        .member-sidebar {
            position: fixed;
            right: -500px;
            top: 0;
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background: white;
            z-index: 99999;
            transition: right 0.3s;
            overflow-y: auto;
        }
        .dark .member-sidebar { background: #181829; border-left: 1px solid #2d2d3f; }
        .member-sidebar.open { right: 0; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99998; display: none; }
        .sidebar-overlay.open { display: block; }
        
        .table-container { overflow-x: auto; border-radius: 12px; }
        table { min-width: 1300px; border-collapse: collapse; }
        th, td { padding: 12px 8px; vertical-align: middle; }
        input[type="date"] { background: transparent; border: none; outline: none; font-size: 10px; width: 85px; }
        
        .gantt-container {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: auto;
            max-height: 600px;
        }
        .dark .gantt-container { background: #181829; border-color: #2d2d3f; }
        .gantt-header {
            display: flex;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 20;
            min-width: fit-content;
        }
        .dark .gantt-header { background: #1e1e2e; border-bottom-color: #2d2d3f; }
        .gantt-row {
            display: flex;
            border-bottom: 1px solid #f1f5f9;
            min-width: fit-content;
        }
        .dark .gantt-row { border-bottom-color: #1e1e2e; }
        .gantt-task-col {
            width: 280px;
            flex-shrink: 0;
            padding: 12px;
            font-weight: 600;
            font-size: 12px;
            border-right: 2px solid #e2e8f0;
            background: inherit;
            position: sticky;
            left: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dark .gantt-task-col { border-right-color: #2d2d3f; }
        .gantt-days { display: flex; }
        .gantt-day {
            width: 48px;
            flex-shrink: 0;
            text-align: center;
            padding: 12px 0;
            border-right: 1px solid #e2e8f0;
            font-size: 9px;
            font-weight: 700;
        }
        .dark .gantt-day { border-right-color: #2d2d3f; }
        .gantt-day.weekend { background: #f1f5f9; }
        .dark .gantt-day.weekend { background: #1a1a2a; }
        .gantt-day.today { background: #e6f0ff; color: #0073ea; font-weight: 800; }
        .gantt-timeline { position: relative; height: 48px; width: fit-content; }
        .gantt-task-bar {
            position: absolute;
            height: 24px;
            border-radius: 12px;
            background: #0073ea;
            top: 12px;
            display: flex;
            align-items: center;
            padding: 0 8px;
            font-size: 9px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .gantt-today-marker {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #ef4444;
            z-index: 15;
            pointer-events: none;
        }
        .move-task-btn {
            opacity: 0;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 6px;
            border-radius: 4px;
        }
        tr:hover .move-task-btn { opacity: 1; }
        
        .status-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 36px;
            padding: 0 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            white-space: nowrap;
        }
        .dropdown-portal {
            position: fixed;
            z-index: 9999999;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 4px;
            min-width: 180px;
        }
        .dark .dropdown-portal { background: #1e1e2e; border-color: #2d2d3f; }
        
        .group-collapse-btn { cursor: pointer; font-size: 16px; margin-right: 8px; color: #64748b; transition: transform 0.2s; display: inline-block; }
        .group-collapse-btn.collapsed { transform: rotate(-90deg); }
        .group-content { transition: all 0.3s ease; }
        .group-content.collapsed { display: none; }
        .group-delete-btn { opacity: 0; transition: opacity 0.2s; background: none; border: none; color: #ef4444; cursor: pointer; font-size: 12px; margin-left: 8px; }
        .group-header:hover .group-delete-btn { opacity: 1; }
        
        .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 16px; }
        .info-item { background: #f8fafc; padding: 12px; border-radius: 12px; }
        .dark .info-item { background: #1e1e2e; }
        
        /* Estilos do relatório e cards de membros */
        .report-section {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            padding: 20px;
            margin-bottom: 20px;
        }
        .dark .report-section {
            background: #181829;
            border-color: #2d2d3f;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .report-title { font-size: 20px; font-weight: 800; }
        .report-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .dark .stat-card { background: #1e1e2e; }
        .stat-value { font-size: 32px; font-weight: 800; line-height: 1; margin-bottom: 5px; }
        .stat-label { font-size: 11px; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .member-report-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .dark .member-report-card { background: #1e1e2e; }
        .member-report-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .member-avatar-large {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }
        .member-info h4 { font-size: 18px; font-weight: 700; margin-bottom: 3px; }
        .member-info p { font-size: 12px; color: #64748b; }
        .member-stats {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .mini-stat {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .dark .mini-stat { background: #181829; border-color: #2d2d3f; }
        .mini-stat .value { font-size: 16px; font-weight: 700; }
        .mini-stat .label { font-size: 8px; font-weight: 600; text-transform: uppercase; color: #64748b; }
        .task-list-compact {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 10px;
        }
        .dark .task-list-compact { border-color: #2d2d3f; }
        .compact-task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
            font-size: 11px;
        }
        .compact-task-item:last-child { border-bottom: none; }
        .compact-task-status {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .pdf-export-btn {
            background: #dc2626;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .pdf-progress {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 16px;
            z-index: 9999999;
            text-align: center;
            display: none;
        }
        .pdf-progress.open { display: block; }
        .pdf-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #dc2626;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .network-mode {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            background: #3b82f620;
            color: #3b82f6;
            border: 1px solid #3b82f6;
            margin-left: 8px;
        }
    </style>
</head>
<body class="bg-monday-bg dark:bg-[#0b0b15] text-slate-800 dark:text-slate-200 h-screen flex flex-col overflow-hidden font-sans">

    <!-- LOGIN MODAL -->
    <div id="loginModal" class="login-modal">
        <div class="login-box">
            <h2 class="text-2xl font-black mb-2">🔐 Workspace Pro</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-6">Gerenciamento de Projetos</p>
            <div id="userList" class="max-h-64 overflow-y-auto mb-4 space-y-2"></div>
            <input type="password" id="loginPassword" placeholder="Digite sua senha" class="w-full p-4 border-2 border-slate-200 dark:border-slate-700 rounded-2xl mb-4 bg-transparent" disabled>
            <button onclick="handleLogin()" id="loginButton" class="w-full btn-primary" disabled>Entrar</button>
            <p class="text-xs text-center text-slate-400 mt-4">Usuários: gerente (admin) • Senha: 123456</p>
        </div>
    </div>

    <header class="bg-white dark:bg-[#181829] border-b border-slate-200 dark:border-slate-800 sticky top-0 z-50">
        <div class="flex items-center justify-between px-4 py-3">
            <div class="flex items-center gap-3">
                <button class="menu-toggle p-2 rounded-full hover:bg-slate-100 text-2xl" onclick="toggleMobileSidebar()">☰</button>
                <div class="flex items-center gap-2 cursor-pointer" onclick="changeMainView('home')">
                    <div class="w-8 h-8 bg-gradient-to-br from-monday-blue to-monday-purple rounded-xl flex items-center justify-center text-white font-bold shadow">W</div>
                    <span class="font-black text-lg tracking-tight">Workspace<span class="text-monday-blue">Pro</span></span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <div id="currentUserIndicator" class="current-user" onclick="toggleUserMenu()">
                    <div id="currentUserAvatar" class="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-sm">?</div>
                    <span id="currentUserName" class="text-sm font-bold hidden sm:inline">Não logado</span>
                </div>
                <div id="networkMode" class="network-mode">📁 Local</div>
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-slate-100 rounded-full text-xl">🌓</button>
                <div class="flex gap-2">
                    <button onclick="saveDatabaseFile()" class="text-[10px] font-bold p-2 bg-green-500 text-white rounded-md">💾 Salvar</button>
                    <button onclick="openDatabaseFile()" class="text-[10px] font-bold p-2 border rounded-md">📂 Abrir</button>
                </div>
            </div>
        </div>
        <nav class="desktop-nav flex items-center gap-1 px-4 pb-2">
            <button onclick="changeMainView('home')" class="nav-btn px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-100">🏠 Início</button>
            <button onclick="changeMainView('dashboard')" class="nav-btn px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-100">📊 Dashboard</button>
            <button onclick="changeMainView('team')" class="nav-btn px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-100">👥 Equipe</button>
            <button onclick="changeMainView('reports')" class="nav-btn px-4 py-2 rounded-lg text-sm font-semibold hover:bg-slate-100">📈 Relatórios</button>
        </nav>
    </header>

    <div class="bottom-nav">
        <button onclick="changeMainView('home')" class="bottom-nav-item" id="bottom-home"><span>🏠</span><span>Início</span></button>
        <button onclick="changeMainView('dashboard')" class="bottom-nav-item" id="bottom-dash"><span>📊</span><span>Dashboard</span></button>
        <button onclick="changeMainView('team')" class="bottom-nav-item" id="bottom-team"><span>👥</span><span>Equipe</span></button>
        <button onclick="changeMainView('reports')" class="bottom-nav-item" id="bottom-reports"><span>📈</span><span>Relatórios</span></button>
        <button onclick="createNewBoard()" class="bottom-nav-item bg-monday-blue text-white rounded-full w-12 h-12 flex items-center justify-center -mt-6 shadow-lg"><span class="text-2xl">+</span></button>
    </div>

    <div id="mobileOverlay" class="mobile-overlay" onclick="closeMobileSidebar()"></div>

    <div class="resizable-container flex-1 overflow-hidden">
        <aside id="sidebar" class="sidebar-resizable bg-white dark:bg-[#181829] border-r border-slate-200 flex flex-col p-4 overflow-y-auto">
            <div class="flex justify-between mb-6">
                <h3 class="text-xs font-bold text-slate-400 uppercase">Quadros</h3>
                <button onclick="createNewBoard()" class="text-monday-blue text-xl" id="newBoardBtn">+</button>
            </div>
            <div id="board-list" class="space-y-2 mb-8"></div>
            <div class="mt-auto border-t pt-4">
                <div class="flex justify-between mb-4 text-xs text-slate-400 uppercase font-bold">
                    <span>Membros</span>
                    <button onclick="openAddMemberModal()" class="text-monday-blue" id="addMemberBtn">+</button>
                </div>
                <div id="sidebar-team" class="flex flex-wrap gap-1"></div>
            </div>
            <div id="resizeHandle" class="resize-handle"></div>
        </aside>

        <main class="flex-1 overflow-y-auto pb-20 md:pb-6 custom-scroll" id="view-container"></main>
    </div>

    <!-- MODAIS -->
    <div id="memberModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-6">👥 Adicionar Membro</h2>
            <input type="hidden" id="memberId">
            <input type="text" id="memberName" placeholder="Nome *" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <input type="text" id="memberUsername" placeholder="Usuário *" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <input type="password" id="memberPassword" placeholder="Senha" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <input type="text" id="memberRole" placeholder="Cargo" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <input type="email" id="memberEmail" placeholder="E-mail" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <input type="tel" id="memberPhone" placeholder="Telefone" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <select id="memberType" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
                <option value="executor">Executor</option>
                <option value="manager">Gerente</option>
            </select>
            <button onclick="saveMember()" class="w-full btn-primary py-3 mt-4">Salvar</button>
            <button onclick="closeMemberModal()" class="w-full mt-2 text-slate-500 py-2">Cancelar</button>
        </div>
    </div>

    <div id="passwordModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-6">🔑 Alterar Senha</h2>
            <input type="password" id="senhaAtual" placeholder="Senha atual" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <input type="password" id="senhaNova" placeholder="Nova senha" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <input type="password" id="senhaConfirmar" placeholder="Confirmar" class="w-full p-3 border rounded-lg mb-3 bg-transparent">
            <button onclick="alterarSenha()" class="w-full btn-primary py-3">Alterar</button>
            <button onclick="closePasswordModal()" class="w-full mt-2 btn-outline py-3">Cancelar</button>
        </div>
    </div>

    <div id="newBoardModal" class="modal hidden">
        <div class="modal-content">
            <h2 class="text-2xl font-black mb-6">📄 Novo Projeto</h2>
            <input type="text" id="newBoardName" placeholder="Nome do projeto *" class="w-full p-4 border rounded-xl bg-transparent">
            <div class="flex gap-3 mt-6"><button onclick="createNewBoardFromModal()" class="flex-1 btn-primary py-3">Criar</button><button onclick="closeNewBoardModal()" class="flex-1 btn-outline py-3">Cancelar</button></div>
        </div>
    </div>

    <div id="resetPasswordModal" class="modal hidden">
        <div class="modal-content text-center">
            <h2 class="text-2xl font-black mb-4">🔑 Nova Senha Gerada</h2>
            <p id="resetUserName" class="mb-2"></p>
            <div class="bg-slate-100 dark:bg-slate-800 p-4 rounded-xl text-2xl font-mono font-bold text-monday-blue mb-4" id="newPasswordDisplay"></div>
            <div class="flex gap-3"><button onclick="copyNewPassword()" class="flex-1 btn-primary">📋 Copiar</button><button onclick="closeResetPasswordModal()" class="flex-1 btn-outline">Fechar</button></div>
        </div>
    </div>

    <div id="userMenu" class="hidden absolute right-4 top-14 bg-white dark:bg-[#181829] border rounded-xl shadow-lg z-50 w-40">
        <button onclick="openPasswordModal()" class="w-full text-left px-4 py-3 text-sm hover:bg-slate-50 rounded-lg">🔑 Alterar Senha</button>
        <button onclick="logout()" class="w-full text-left px-4 py-3 text-sm text-red-500 hover:bg-red-50 rounded-lg">🚪 Sair</button>
    </div>

    <div id="memberSidebarOverlay" class="sidebar-overlay" onclick="closeMemberSidebar()"></div>
    <div id="memberSidebar" class="member-sidebar">
        <div class="p-6 border-b"><div class="flex items-center gap-3"><div id="sidebarMemberAvatar" class="w-12 h-12 rounded-full flex items-center justify-center text-white font-bold"></div><div><h3 id="sidebarMemberName" class="font-black text-lg"></h3><p id="sidebarMemberRole" class="text-xs text-slate-400"></p></div><button onclick="closeMemberSidebar()" class="ml-auto text-2xl">&times;</button></div><div id="sidebarMemberInfo" class="info-grid mt-4"></div></div>
        <div class="p-6" id="memberSidebarContent"></div>
    </div>

    <div id="toast" class="fixed bottom-20 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-2xl opacity-0 transition-all duration-300 z-[9999]">Alterações salvas!</div>
    <div id="dropdownPortal"></div>
    <div id="pdfProgress" class="pdf-progress"><div class="pdf-spinner"></div><h3 class="font-bold text-lg mb-2">Gerando PDF...</h3><p class="text-sm text-slate-400">Aguarde...</p></div>

    <script>
        // ==================== ESTADO GLOBAL ====================
        let state = {
            activeView: 'home',
            boardView: 'table',
            calendarDate: new Date(),
            activeBoardId: null,
            darkMode: false,
            searchQuery: '',
            currentUser: null,
            selectedUserId: null,
            tempUser: null,
            autoSaveEnabled: true,
            autoSaveInterval: null,
            currentFilePath: null,
            collapsedGroups: {},
            team: [],
            boards: []
        };

        const STATUS_TYPES = {
            'Nao Iniciado': { label: 'A Fazer', color: '#c4c4c4' },
            'Trabalhando': { label: 'Em Andamento', color: '#0073ea' },
            'Travado': { label: 'Travado', color: '#fb275d' },
            'Concluido': { label: 'Concluído', color: '#00ca72' }
        };

        const PRIORITY_TYPES = {
            'Baixa': { label: 'Baixa', color: '#579bfc' },
            'Media': { label: 'Média', color: '#a25ddc' },
            'Alta': { label: 'Alta', color: '#ffad00' },
            'Critica': { label: 'Crítica', color: '#fb275d' }
        };

        // ==================== FUNÇÕES AUXILIARES ====================
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function showToast(msg, isErr) { const t = document.getElementById('toast'); t.textContent = msg; t.style.backgroundColor = isErr ? '#ef4444' : '#1e293b'; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 3000); }
        
        function calculateDueDateStatus(dueDate, taskStatus) {
            if (taskStatus === 'Concluido') return { status: 'concluido', class: 'status-tag-ok', label: 'Concluído' };
            if (!dueDate) return { status: 'Sem Data', class: '', label: 'Sem Data' };
            const today = new Date(); today.setHours(0,0,0,0);
            const due = new Date(dueDate); due.setHours(0,0,0,0);
            const diffDays = Math.ceil((due - today) / (1000*60*60*24));
            if (diffDays < 0) return { status: 'overdue', class: 'status-tag-overdue', label: `Atrasado ${Math.abs(diffDays)}d` };
            if (diffDays === 0) return { status: 'today', class: 'status-tag-today', label: 'Vence hoje' };
            if (diffDays <= 7) return { status: 'week', class: 'status-tag-week', label: `Vence em ${diffDays}d` };
            return { status: 'ok', class: 'status-tag-ok', label: 'Em dia' };
        }
        
        function calculateProjectProgress(board) {
            const tasks = board.groups?.flatMap(g => g.tasks || []) || [];
            if (!tasks.length) return 0;
            return Math.round((tasks.filter(t => t.status === 'Concluido').length / tasks.length) * 100);
        }
        function isProjectCompleted(board) {
            const tasks = board.groups?.flatMap(g => g.tasks || []) || [];
            return tasks.length && tasks.every(t => t.status === 'Concluido');
        }

        // ==================== PERSISTÊNCIA (MongoDB + localStorage) ====================
        async function salvarEquipe() { try { await fetch('/api/equipe', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ team: state.team }) }); } catch(e) { console.warn('Erro ao salvar equipe no MongoDB', e); } }
        async function salvarBoards() { try { await fetch('/api/boards', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ boards: state.boards }) }); } catch(e) { console.warn('Erro ao salvar boards no MongoDB', e); } }
        async function salvarBoard(b) { try { await fetch('/api/board', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(b) }); } catch(e) { console.warn('Erro ao salvar board no MongoDB', e); } }
        async function deletarBoard(id) { try { await fetch(`/api/board/${id}`, { method: 'DELETE' }); } catch(e) { console.warn('Erro ao deletar board no MongoDB', e); } }
        
        async function carregarDadosMongo() {
            try {
                const response = await fetch('/api/dados');
                if (!response.ok) throw new Error('HTTP error');
                const data = await response.json();
                if (data.team && data.team.length) state.team = data.team;
                if (data.boards && data.boards.length) state.boards = data.boards;
                document.getElementById('networkMode').innerHTML = '🌐 MongoDB Online';
                document.getElementById('networkMode').style.background = '#10b98120';
                document.getElementById('networkMode').style.color = '#10b981';
                document.getElementById('networkMode').style.borderColor = '#10b981';
                console.log('Dados carregados do MongoDB');
                return true;
            } catch (error) {
                console.log('MongoDB offline, usando localStorage');
                document.getElementById('networkMode').innerHTML = '📁 LocalStorage';
                document.getElementById('networkMode').style.background = '#94a3b820';
                document.getElementById('networkMode').style.color = '#64748b';
                document.getElementById('networkMode').style.borderColor = '#94a3b8';
                return false;
            }
        }
        
        async function saveToLocalStorage() {
            const data = { team: state.team, boards: state.boards, currentUser: state.currentUser, darkMode: state.darkMode };
            localStorage.setItem('workspace_pro_data', JSON.stringify(data));
        }
        
        function loadFromLocalStorage() {
            const saved = localStorage.getItem('workspace_pro_data');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    if (data.team) state.team = data.team;
                    if (data.boards) state.boards = data.boards;
                    if (data.currentUser) state.currentUser = data.currentUser;
                    if (data.darkMode) { state.darkMode = data.darkMode; if(state.darkMode) document.documentElement.classList.add('dark'); }
                } catch(e) {}
            }
        }
        
        async function fullSave() {
            await saveToLocalStorage();
            await Promise.all([salvarEquipe(), salvarBoards()]);
        }
        
        function openDatabaseFile() {
            const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const text = await file.text();
                    const imported = JSON.parse(text);
                    if (imported.team && imported.boards) {
                        state.team = imported.team; state.boards = imported.boards;
                        await fullSave(); renderUserList(); render(); renderSidebar();
                        showToast('✅ Banco carregado');
                    }
                } catch(e) { showToast('❌ Erro', true); }
            };
            input.click();
        }
        
        function saveDatabaseFile() {
            const dataStr = JSON.stringify({ team: state.team, boards: state.boards }, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `workspace_${new Date().toISOString().split('T')[0]}.json`;
            a.href = url; a.click(); URL.revokeObjectURL(url);
            showToast('✅ Dados exportados');
        }
        
        function exportJSON() { saveDatabaseFile(); }
        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (imported.team && imported.boards) {
                        state.team = imported.team; state.boards = imported.boards;
                        await fullSave(); renderUserList(); render(); renderSidebar();
                        showToast('✅ Importado');
                    }
                } catch(e) { showToast('❌ Erro', true); }
            };
            reader.readAsText(file);
        }
        
        // ==================== LOGIN ====================
        function renderUserList() {
            const list = document.getElementById('userList');
            if (!list) return;
            list.innerHTML = state.team.map(u => `
                <div class="user-item ${state.selectedUserId === u.id ? 'selected' : ''}" onclick="selectUser('${u.id}')">
                    <div class="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold" style="background: ${u.color}">${u.name.charAt(0)}</div>
                    <div><div class="font-bold">${escapeHtml(u.name)}</div><div class="text-xs text-slate-500">@${escapeHtml(u.username)}</div></div>
                    ${u.firstAccess ? '<span class="text-[10px] bg-yellow-100 text-yellow-700 px-2 py-1 rounded">🆕</span>' : ''}
                </div>
            `).join('');
        }
        function selectUser(id) { state.selectedUserId = id; document.getElementById('loginPassword').disabled = false; document.getElementById('loginButton').disabled = false; renderUserList(); }
        function handleLogin() {
            const pwd = document.getElementById('loginPassword').value;
            const user = state.team.find(u => u.id === state.selectedUserId);
            if (!user) { alert('Selecione um usuário'); return; }
            if (btoa(pwd) === user.password) {
                if (user.firstAccess) { state.tempUser = user; document.getElementById('passwordModal').classList.remove('hidden'); document.getElementById('loginModal').style.display = 'none'; }
                else { completeLogin(user); }
            } else { alert('Senha incorreta'); }
        }
        function completeLogin(user) {
            state.currentUser = user;
            document.getElementById('currentUserAvatar').style.background = user.color;
            document.getElementById('currentUserAvatar').textContent = user.name.charAt(0);
            document.getElementById('currentUserName').textContent = user.name;
            document.getElementById('currentUserRole').textContent = user.type === 'manager' ? 'Gerente' : 'Executor';
            document.getElementById('loginModal').style.display = 'none';
            updateUIBasedOnPermissions();
            render(); renderSidebar();
            showToast(`Bem-vindo, ${user.name}!`);
        }
        function openPasswordModal() { document.getElementById('userMenu').classList.add('hidden'); document.getElementById('passwordModal').classList.remove('hidden'); }
        function closePasswordModal() { document.getElementById('passwordModal').classList.add('hidden'); }
        async function alterarSenha() {
            const atual = document.getElementById('senhaAtual').value;
            const nova = document.getElementById('senhaNova').value;
            const conf = document.getElementById('senhaConfirmar').value;
            if (!atual || !nova || !conf) { alert('Preencha todos os campos'); return; }
            if (btoa(atual) !== state.currentUser.password) { alert('Senha atual incorreta'); return; }
            if (nova !== conf) { alert('Senhas não conferem'); return; }
            if (nova.length < 4) { alert('Mínimo 4 caracteres'); return; }
            state.currentUser.password = btoa(nova);
            const usuario = state.team.find(u => u.id === state.currentUser.id);
            if (usuario) { usuario.password = btoa(nova); usuario.firstAccess = false; }
            await fullSave();
            closePasswordModal();
            alert('Senha alterada!');
        }
        function toggleUserMenu() { document.getElementById('userMenu').classList.toggle('hidden'); }
        function logout() { state.currentUser = null; fullSave(); document.getElementById('loginModal').style.display = 'flex'; renderUserList(); render(); }
        document.addEventListener('click', (e) => { const menu = document.getElementById('userMenu'); const ind = document.getElementById('currentUserIndicator'); if (!ind?.contains(e.target) && menu && !menu.contains(e.target)) menu.classList.add('hidden'); });
        
        // ==================== PERMISSÕES ====================
        function isCurrentUserManager() { return state.currentUser?.type === 'manager'; }
        function updateUIBasedOnPermissions() {
            const isMgr = isCurrentUserManager();
            document.getElementById('newBoardBtn').style.display = isMgr ? 'block' : 'none';
            document.getElementById('addMemberBtn').style.display = isMgr ? 'block' : 'none';
        }
        function canEditTask(t) { if (!state.currentUser) return false; if (state.currentUser.type === 'manager') return true; return state.currentUser.type === 'executor' && t.ownerId === state.currentUser.id; }
        function filterTasksByUser(tasks) { if (!state.currentUser) return []; if (state.currentUser.type === 'manager') return tasks; return tasks.filter(t => t.ownerId === state.currentUser.id); }
        
        // ==================== MEMBROS (cards, edição corrigida) ====================
        function openAddMemberModal() { document.getElementById('memberModal').classList.remove('hidden'); }
        function closeMemberModal() { document.getElementById('memberModal').classList.add('hidden'); }
        async function saveMember() {
            const id = document.getElementById('memberId').value;
            const name = document.getElementById('memberName').value.trim();
            const username = document.getElementById('memberUsername').value.trim();
            const pwd = document.getElementById('memberPassword').value;
            const role = document.getElementById('memberRole').value;
            const email = document.getElementById('memberEmail').value;
            const phone = document.getElementById('memberPhone').value;
            const type = document.getElementById('memberType').value;
            if (!name || !username) { alert('Preencha nome e usuário'); return; }
            
            if (id) {
                // EDIÇÃO: verifica duplicidade ignorando o próprio ID
                const member = state.team.find(m => m.id === id);
                if (!member) { alert('Membro não encontrado'); return; }
                if (state.team.some(m => m.id !== id && m.username === username)) { alert('Nome de usuário já existe'); return; }
                member.name = name;
                member.username = username;
                if (pwd) { member.password = btoa(pwd); member.firstAccess = true; }
                member.role = role;
                member.email = email;
                member.phone = phone;
                member.cargo = role;
                member.type = type;
                showToast(`✅ Membro ${name} atualizado`);
            } else {
                // ADIÇÃO
                if (state.team.some(u => u.username === username)) { alert('Usuário já existe'); return; }
                const newMember = {
                    id: 'm' + Date.now(),
                    username, name,
                    password: btoa(pwd || '123456'),
                    color: '#' + Math.floor(Math.random()*16777215).toString(16),
                    role, email, phone, cargo: role, type,
                    firstAccess: true
                };
                state.team.push(newMember);
                showToast(`✅ Membro ${name} adicionado`);
            }
            await fullSave();
            closeMemberModal();
            renderUserList();
            renderSidebar();
            render();
        }
        
        function deleteMember(id) {
            if (!isCurrentUserManager()) return;
            if (state.team.length <= 1) return alert("Mínimo um membro");
            const m = state.team.find(u => u.id === id);
            if (m.type === 'manager' && state.team.filter(u => u.type === 'manager').length <= 1) return alert("Não pode remover único gerente");
            if (!confirm(`Remover ${m.name}?`)) return;
            const manager = state.team.find(u => u.type === 'manager');
            if (manager) { state.boards.forEach(b => { b.groups.forEach(g => { g.tasks.forEach(t => { if (t.ownerId === id) t.ownerId = manager.id; }); }); }); }
            state.team = state.team.filter(u => u.id !== id);
            fullSave(); renderUserList(); renderSidebar(); render();
            showToast(`✅ Membro removido`);
        }
        
        function openEditMemberModal(id) {
            const m = state.team.find(u => u.id === id);
            if (!m) return;
            document.getElementById('memberId').value = m.id;
            document.getElementById('memberName').value = m.name;
            document.getElementById('memberUsername').value = m.username;
            document.getElementById('memberPassword').value = '';
            document.getElementById('memberRole').value = m.role || '';
            document.getElementById('memberEmail').value = m.email || '';
            document.getElementById('memberPhone').value = m.phone || '';
            document.getElementById('memberType').value = m.type;
            document.getElementById('memberModal').classList.remove('hidden');
        }
        
        let currentResetPassword = '';
        function resetUserPassword(userId) {
            const user = state.team.find(u => u.id === userId);
            if (!user) return;
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$';
            let newPass = '';
            for (let i = 0; i < 8; i++) newPass += chars.charAt(Math.floor(Math.random() * chars.length));
            user.password = btoa(newPass);
            user.firstAccess = true;
            currentResetPassword = newPass;
            document.getElementById('resetUserName').innerHTML = `Nova senha para: ${user.name}`;
            document.getElementById('newPasswordDisplay').innerHTML = newPass;
            document.getElementById('resetPasswordModal').classList.remove('hidden');
            fullSave();
        }
        function copyNewPassword() { navigator.clipboard.writeText(currentResetPassword); showToast('Senha copiada!'); }
        function closeResetPasswordModal() { document.getElementById('resetPasswordModal').classList.add('hidden'); }
        
        // ==================== SIDEBAR ====================
        function toggleMobileSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('mobileOverlay').classList.toggle('open'); }
        function closeMobileSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('mobileOverlay').classList.remove('open'); }
        
        function renderSidebar() {
            const ativos = state.boards.filter(b => !isProjectCompleted(b));
            const concluidos = state.boards.filter(b => isProjectCompleted(b));
            const renderList = (boards, showProgress) => boards.map(b => {
                const progress = calculateProjectProgress(b);
                return `<div onclick="selectBoard(${b.id})" class="flex items-start gap-2 p-2 rounded-lg cursor-pointer hover:bg-slate-100 mb-1">
                    <span class="text-lg">📋</span>
                    <div class="flex-1"><div class="text-sm font-medium">${escapeHtml(b.name)}</div>${showProgress ? `<div class="progress-bar mt-1"><div class="progress-fill" style="width: ${progress}%"></div></div><span class="text-[8px] text-slate-400">${progress}%</span>` : ''}</div>
                    ${isCurrentUserManager() ? `<button onclick="deleteBoard(event, ${b.id})" class="text-slate-400 hover:text-red-500 text-xs">✕</button>` : ''}
                </div>`;
            }).join('');
            document.getElementById('board-list').innerHTML = `<div class="mb-4"><p class="text-xs font-bold text-slate-400 uppercase mb-2">📊 Em Andamento</p>${renderList(ativos, true)}</div>${concluidos.length ? `<div><p class="text-xs font-bold text-slate-400 uppercase mb-2">✅ Concluídos</p>${renderList(concluidos, false)}</div>` : ''}`;
            document.getElementById('sidebar-team').innerHTML = state.team.map(m => `<div onclick="openMemberSidebar('${m.id}')" class="w-6 h-6 rounded-full flex items-center justify-center text-[8px] font-bold text-white cursor-pointer hover:scale-110" style="background: ${m.color}">${m.name.charAt(0)}</div>`).join('');
        }
        
        function openMemberSidebar(id) {
            const member = state.team.find(u => u.id === id);
            if (!member) return;
            document.getElementById('sidebarMemberAvatar').style.background = member.color;
            document.getElementById('sidebarMemberAvatar').innerHTML = member.name.charAt(0);
            document.getElementById('sidebarMemberName').innerText = member.name;
            document.getElementById('sidebarMemberRole').innerText = member.role || 'Membro';
            const tasks = [];
            state.boards.forEach(b => { b.groups?.forEach(g => { g.tasks?.forEach(t => { if (t.ownerId === id) tasks.push({ ...t, boardName: b.name, groupName: g.name }); }); }); });
            const total = tasks.length, concluidas = tasks.filter(t=>t.status==='Concluido').length;
            const atrasadas = tasks.filter(t=>t.status!=='Concluido' && t.timeline?.[1] && t.timeline[1] < new Date().toISOString().split('T')[0]).length;
            const hoje = new Date().toISOString().split('T')[0];
            const venceHoje = tasks.filter(t=>t.status!=='Concluido' && t.timeline?.[1] === hoje).length;
            document.getElementById('sidebarMemberInfo').innerHTML = `<div class="info-item"><div class="text-xl font-bold">${total}</div><div class="text-xs">Tarefas</div></div><div class="info-item"><div class="text-xl font-bold text-green-600">${concluidas}</div><div class="text-xs">Concluídas</div></div><div class="info-item"><div class="text-xl font-bold text-red-500">${atrasadas}</div><div class="text-xs">Atrasadas</div></div><div class="info-item"><div class="text-xl font-bold text-orange-500">${venceHoje}</div><div class="text-xs">Vencem hoje</div></div>`;
            document.getElementById('memberSidebarContent').innerHTML = `<h4 class="font-bold mb-3">📋 Tarefas</h4><div class="space-y-3 max-h-[400px] overflow-y-auto">${tasks.length ? tasks.map(t => `<div class="border rounded-lg p-3"><div class="font-semibold">${escapeHtml(t.title)}</div><div class="text-xs text-slate-400">Projeto: ${escapeHtml(t.boardName)} | Grupo: ${escapeHtml(t.groupName)}</div><div class="flex justify-between mt-2"><span class="status-trigger text-xs py-0.5 px-2" style="background:${STATUS_TYPES[t.status]?.color}">${STATUS_TYPES[t.status]?.label}</span><span class="text-xs">Vence: ${t.timeline?.[1] ? new Date(t.timeline[1]).toLocaleDateString() : 'Sem data'}</span></div></div>`).join('') : '<p class="text-slate-400 text-sm">Nenhuma tarefa atribuída.</p>'}</div>`;
            document.getElementById('memberSidebar').classList.add('open');
            document.getElementById('memberSidebarOverlay').classList.add('open');
        }
        function closeMemberSidebar() { document.getElementById('memberSidebar').classList.remove('open'); document.getElementById('memberSidebarOverlay').classList.remove('open'); }
        
        // ==================== RENDER PRINCIPAL ====================
        function render() {
            if (!state.currentUser) return;
            renderSidebar(); updateUIBasedOnPermissions();
            const container = document.getElementById('view-container');
            if (!container) return;
            if (state.activeView === 'home') { renderHome(); document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active')); document.getElementById('bottom-home')?.classList.add('active'); }
            else if (state.activeView === 'dashboard') { renderDashboard(); document.getElementById('bottom-dash')?.classList.add('active'); }

        async function exportReportToPDF() {
            const btn = document.getElementById('pdfExportBtn');
            const progress = document.getElementById('pdfProgress');
            if (!btn || !progress) return;
            try {
                btn.disabled = true;
                progress.classList.add('open');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
                const reportElement = document.getElementById('view-container');
                const reportSections = reportElement.querySelectorAll('.report-section, #reportMembers .member-report-card');
                const pageWidth = pdf.internal.pageSize.getWidth();
                const pageHeight = pdf.internal.pageSize.getHeight();
                let currentPage = 1;
                for (let i = 0; i < reportSections.length; i++) {
                    const section = reportSections[i];
                    const clone = section.cloneNode(true);
                    clone.style.width = '700px';
                    clone.style.padding = '20px';
                    clone.style.background = 'white';
                    clone.style.color = '#1e293b';
                    clone.querySelectorAll('button, details, summary').forEach(el => el.style.display = 'none');
                    const tempDiv = document.createElement('div');
                    tempDiv.style.position = 'absolute';
                    tempDiv.style.left = '-9999px';
                    tempDiv.style.top = '0';
                    tempDiv.appendChild(clone);
                    document.body.appendChild(tempDiv);
                    try {
                        const canvas = await html2canvas(clone, { scale: 2, backgroundColor: '#ffffff', logging: false, windowWidth: 800 });
                        const imgData = canvas.toDataURL('image/jpeg', 1.0);
                        const imgWidth = pageWidth - 20;
                        const imgHeight = (canvas.height * imgWidth) / canvas.width;
                        if (i > 0) pdf.addPage();
                        pdf.setFontSize(10);
                        pdf.setTextColor(100, 116, 139);
                        pdf.text('Workspace Pro - Relatório de Desempenho', 10, 10);
                        pdf.text(`Página ${currentPage}`, pageWidth - 30, 10);
                        pdf.setDrawColor(226, 232, 240);
                        pdf.line(10, 15, pageWidth - 10, 15);
                        pdf.addImage(imgData, 'JPEG', 10, 20, imgWidth, imgHeight);
                        pdf.setFontSize(8);
                        pdf.setTextColor(148, 163, 184);
                        pdf.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 10, pageHeight - 5);
                        currentPage++;
                    } finally {
                        document.body.removeChild(tempDiv);
                    }
                }
                pdf.save(`relatorio_equipe_${new Date().toISOString().split('T')[0]}.pdf`);
                showToast('✅ PDF exportado!');
            } catch (error) { showToast('❌ Erro ao gerar PDF', true); } finally { btn.disabled = false; progress.classList.remove('open'); }
        }
        
        // ==================== DASHBOARD ====================

            state.boards.forEach(b => { b.groups?.forEach(g => { g.tasks?.forEach(t => { if (STATUS_TYPES[t.status]) statusCounts[t.status]++; if (teamTask[t.ownerId]) { teamTask[t.ownerId].count++; const ds = calculateDueDateStatus(t.timeline?.[1], t.status); if (ds.status === 'overdue' && t.status !== 'Concluido') teamTask[t.ownerId].overdue++; } }); }); });

                    const dueStatus = calculateDueDateStatus(t.timeline?.[1], t.status);
                    const canEdit = canEditTask(t);
                    return `<tr class="border-t"><td class="p-2"><div class="flex gap-1">${isManager && tIdx > 0 ? `<button onclick="moveTaskUp('${g.id}','${t.id}')" class="move-task-btn">⬆️</button>` : ''}${isManager && tIdx < arr.length-1 ? `<button onclick="moveTaskDown('${g.id}','${t.id}')" class="move-task-btn">⬇️</button>` : ''}</div></td>
                    <td class="p-2"><input type="text" value="${escapeHtml(t.title)}" ${canEdit ? `onchange="updateTaskField('${g.id}','${t.id}','title',this.value)"` : 'disabled'} class="bg-transparent w-full outline-none ${!canEdit ? 'opacity-50' : ''}"></td>
                    <td class="p-2"><select ${isManager ? `onchange="updateTaskField('${g.id}','${t.id}','ownerId',this.value)"` : 'disabled'} class="bg-transparent text-xs">${state.team.map(m => `<option value="${m.id}" ${t.ownerId === m.id ? 'selected' : ''}>${m.name}</option>`).join('')}</select></td>
                    <td class="p-2"><div class="status-trigger" style="background:${STATUS_TYPES[t.status]?.color}" ${canEdit ? `onclick='showStatusDropdown(this, "${g.id}", "${t.id}")'` : ''}>${STATUS_TYPES[t.status]?.label}</div></td>
                    <td class="p-2"><div class="status-trigger" style="background:${PRIORITY_TYPES[t.priority]?.color}" ${isManager ? `onclick='showPriorityDropdown(this, "${g.id}", "${t.id}")'` : ''}>${PRIORITY_TYPES[t.priority]?.label}</div></td>
                    <td class="p-2"><div class="flex items-center gap-1 text-xs"><input type="date" value="${t.timeline?.[0] || ''}" ${isManager ? `onchange="updateTaskDate('${g.id}','${t.id}',0,this.value)"` : 'disabled'} class="bg-transparent w-20"> - <input type="date" value="${t.timeline?.[1] || ''}" ${isManager ? `onchange="updateTaskDate('${g.id}','${t.id}',1,this.value)"` : 'disabled'} class="bg-transparent w-20"></div></td>
                    <td class="p-2"><div class="text-[10px] ${dueStatus.class} px-1 rounded text-center">${dueStatus.label}</div></td>
                    ${isManager ? `<td class="p-2"><button onclick="deleteTask('${g.id}','${t.id}')" class="text-red-400">🗑️</button></td>` : ''} </tr>`;
                }).join('')}</tbody> </table></div>${isManager ? `<div class="p-3 border-t"><button onclick="addNewTask('${g.id}')" class="text-monday-blue text-sm">+ Adicionar tarefa</button></div>` : ''}</div></div>`;
            }).join('')}</div>`;
        }
        function renderKanban(board) {
            const tasks = board.groups?.flatMap(g => g.tasks?.map(t => ({...t, groupName: g.name, groupColor: g.color, groupId: g.id}))) || [];
            const filtered = filterTasksByUser(tasks);
            return `<div class="flex gap-4 overflow-x-auto pb-4">${Object.entries(STATUS_TYPES).map(([key,info]) => `<div class="min-w-[280px] bg-slate-50 dark:bg-slate-800/30 rounded-xl p-3"><div class="flex justify-between mb-3"><h3 class="font-bold">${info.label}</h3><span class="text-xs text-slate-400">${filtered.filter(t=>t.status===key).length}</span></div><div class="space-y-2">${filtered.filter(t=>t.status===key).map(t => `<div class="bg-white dark:bg-[#181829] p-3 rounded-lg shadow-sm cursor-pointer" onclick="showTaskDetail('${t.id}')"><div class="font-bold text-sm">${escapeHtml(t.title)}</div><div class="text-[10px] text-slate-400 mt-1">📁 ${escapeHtml(t.groupName)}</div><div class="flex justify-between mt-2 text-xs"><span class="priority-badge" style="background:${PRIORITY_TYPES[t.priority]?.color}20; color:${PRIORITY_TYPES[t.priority]?.color}">${t.priority}</span><div class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs" style="background:${state.team.find(m=>m.id===t.ownerId)?.color}">${state.team.find(m=>m.id===t.ownerId)?.name?.charAt(0)}</div></div>${canEditTask(t) ? `<div class="mt-2"><div class="status-trigger text-xs py-1 px-2" style="background:${info.color}" onclick='event.stopPropagation();showStatusDropdown(this, "${t.groupId}", "${t.id}")'>${info.label} ▼</div></div>` : ''}</div>`).join('')}</div></div>`).join('')}</div>`;
        }
        function renderGantt(board) {
            const tasks = board.groups?.flatMap(g => g.tasks?.map(t => ({...t, groupName: g.name}))) || [];
            if (!tasks.length) return '<div class="p-8 text-center text-slate-400">Nenhuma tarefa com datas definidas</div>';
            const today = new Date(); today.setHours(0,0,0,0);
            const dates = tasks.flatMap(t => t.timeline || []).filter(d=>d).map(d=>new Date(d));
            const start = new Date(Math.min(...dates.map(d=>d.getTime()), today.getTime()));
            start.setDate(start.getDate() - 5);
            const end = new Date(Math.max(...dates.map(d=>d.getTime()), today.getTime()));
            end.setDate(end.getDate() + 30);
            const days = []; let cur = new Date(start);
            while (cur <= end) { days.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
            return `<div class="gantt-container"><div class="flex border-b sticky top-0 bg-white dark:bg-[#181829]"><div class="w-64 p-2 font-bold text-sm">Tarefa</div><div class="flex overflow-x-auto">${days.map(d => `<div class="w-12 text-center text-[10px] p-1 border-r ${d.getDay()===0||d.getDay()===6 ? 'bg-slate-100 dark:bg-slate-800' : ''} ${d.toDateString()===today.toDateString() ? 'bg-blue-100 dark:bg-blue-900/30 font-bold text-monday-blue' : ''}">${d.getDate()}<br><span class="text-[8px]">${d.toLocaleDateString('pt',{month:'short'})}</span></div>`).join('')}</div></div>${tasks.map(t => {
                if (!t.timeline?.[0] || !t.timeline?.[1]) return '';
                const startOff = Math.max(0, Math.floor((new Date(t.timeline[0]) - start) / (1000*60*60*24)));
                const dur = Math.max(1, Math.ceil((new Date(t.timeline[1]) - new Date(t.timeline[0])) / (1000*60*60*24)) + 1);
                if (startOff > days.length) return '';
                return `<div class="flex border-b"><div class="w-64 p-2 text-sm truncate" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</div><div class="relative" style="width:${days.length*48}px; height:40px"><div class="absolute rounded-full h-6 top-1 text-white text-[10px] flex items-center px-2" style="left:${startOff*48}px; width:${dur*48}px; background:${STATUS_TYPES[t.status]?.color || '#c4c4c4'}">${STATUS_TYPES[t.status]?.label || t.status}</div>${(()=>{const todayOff = Math.floor((today-start)/(1000*60*60*24)); if(todayOff>=0 && todayOff<days.length) return `<div class="absolute top-0 bottom-0 w-0.5 bg-red-500" style="left:${todayOff*48}px"></div>`; return '';})()}</div></div>`;
            }).join('')}</div>`;
        }
        function renderCalendar(board) {
            const tasks = board.groups?.flatMap(g => g.tasks?.map(t => ({...t, groupName: g.name, groupColor: g.color}))) || [];
            const today = new Date();
            const month = state.calendarDate?.getMonth() || today.getMonth();
            const year = state.calendarDate?.getFullYear() || today.getFullYear();
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month+1, 0).getDate();
            const tasksByDate = {};
            tasks.forEach(t => { if (t.timeline?.[1]) { const d = new Date(t.timeline[1]); if (d.getMonth() === month && d.getFullYear() === year) { const key = d.getDate(); if (!tasksByDate[key]) tasksByDate[key] = []; tasksByDate[key].push(t); } } });
            let html = `<div class="bg-white dark:bg-[#181829] rounded-xl border"><div class="flex justify-between p-4 border-b"><button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-full">◀</button><h3 class="font-bold">${new Date(year, month).toLocaleDateString('pt', {month:'long', year:'numeric'})}</h3><button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-full">▶</button></div><div class="grid grid-cols-7 text-center py-2 text-xs font-bold text-slate-400"><span>D</span><span>S</span><span>T</span><span>Q</span><span>Q</span><span>S</span><span>S</span></div><div class="grid grid-cols-7">`;
            for (let i=0; i<firstDay; i++) html += `<div class="h-24 p-1 border bg-slate-50 dark:bg-slate-800/20"></div>`;
            for (let d=1; d<=daysInMonth; d++) { const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear(); html += `<div class="h-24 p-1 border ${isToday ? 'bg-blue-50 dark:bg-blue-900/20' : ''}"><div class="text-xs font-bold ${isToday ? 'text-monday-blue' : ''}">${d}</div><div class="space-y-1 mt-1">${(tasksByDate[d] || []).slice(0,2).map(t => `<div class="text-[9px] truncate p-0.5 rounded text-white" style="background:${t.groupColor}" title="${escapeHtml(t.title)}">${escapeHtml(t.title)}</div>`).join('')}${(tasksByDate[d] || []).length > 2 ? `<div class="text-[8px] text-slate-400">+${tasksByDate[d].length-2}</div>` : ''}</div></div>`; }
            const remaining = 42 - (firstDay + daysInMonth);
            for (let i=0; i<remaining; i++) html += `<div class="h-24 p-1 border bg-slate-50 dark:bg-slate-800/20"></div>`;
            html += `</div></div>`;
            return html;
        }
        function changeMonth(delta) { state.calendarDate = state.calendarDate || new Date(); state.calendarDate.setMonth(state.calendarDate.getMonth() + delta); renderBoardContent(); }
        function toggleGroup(gId) { state.collapsedGroups[gId] = !state.collapsedGroups[gId]; renderBoardContent(); }
        
        // ==================== AÇÕES DE TAREFAS ====================
        async function updateTaskField(gId, tId, field, val) {
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (!group) return;
            const task = group.tasks.find(t => t.id == tId);
            if (!task) return;
            if (!canEditTask(task) && field !== 'status') return;
            task[field] = val;
            await fullSave();
            renderBoardContent();
        }
        async function updateTaskDate(gId, tId, idx, val) {
            if (!isCurrentUserManager()) return;
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (!group) return;
            const task = group.tasks.find(t => t.id == tId);
            if (!task) return;
            if (!task.timeline) task.timeline = ['', ''];
            task.timeline[idx] = val;
            await fullSave();
            renderBoardContent();
        }
        async function addNewTask(gId) {
            if (!isCurrentUserManager()) return;
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (!group) return;
            const today = new Date();
            const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate() + 7);
            group.tasks = group.tasks || [];
            group.tasks.push({ id: 't' + Date.now() + Math.random(), title: 'Nova Tarefa', ownerId: state.team.find(m => m.type === 'executor')?.id || state.team[0]?.id, status: 'Nao Iniciado', priority: 'Media', timeline: [today.toISOString().split('T')[0], nextWeek.toISOString().split('T')[0]] });
            await fullSave();
            renderBoardContent();
            showToast('✅ Tarefa adicionada');
        }
        async function deleteTask(gId, tId) {
            if (!isCurrentUserManager()) return;
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (!group) return;
            group.tasks = group.tasks.filter(t => t.id != tId);
            await fullSave();
            renderBoardContent();
            showToast('✅ Tarefa removida');
        }
        async function addNewGroup() {
            if (!isCurrentUserManager()) return;
            const name = prompt("Nome do novo grupo:");
            if (!name) return;
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            board.groups = board.groups || [];
            board.groups.push({ id: Date.now() + Math.random(), name: name, color: '#' + Math.floor(Math.random()*16777215).toString(16), tasks: [] });
            await fullSave();
            renderBoardContent();
            showToast('✅ Grupo adicionado');
        }
        async function deleteGroup(gId) {
            if (!isCurrentUserManager()) { showToast('Apenas gerentes', true); return; }
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (!group) return;
            if (!confirm(`Excluir grupo "${group.name}"?`)) return;
            board.groups = board.groups.filter(g => g.id != gId);
            await fullSave();
            renderBoardContent();
            showToast('✅ Grupo excluído');
        }
        async function renameGroup(gId, newName) {
            if (!isCurrentUserManager()) return;
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (group) { group.name = newName; await fullSave(); renderBoardContent(); }
        }
        async function moveTaskUp(gId, tId) {
            if (!isCurrentUserManager()) { showToast('Apenas gerentes', true); return; }
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (!group) return;
            const idx = group.tasks.findIndex(t => t.id == tId);
            if (idx <= 0) return;
            [group.tasks[idx-1], group.tasks[idx]] = [group.tasks[idx], group.tasks[idx-1]];
            await fullSave();
            renderBoardContent();
        }
        async function moveTaskDown(gId, tId) {
            if (!isCurrentUserManager()) { showToast('Apenas gerentes', true); return; }
            const board = state.boards.find(b => b.id === state.activeBoardId);
            if (!board) return;
            const group = board.groups.find(g => g.id == gId);
            if (!group) return;
            const idx = group.tasks.findIndex(t => t.id == tId);
            if (idx >= group.tasks.length-1) return;
            [group.tasks[idx], group.tasks[idx+1]] = [group.tasks[idx+1], group.tasks[idx]];
            await fullSave();
            renderBoardContent();
        }
        
        // ==================== DROPDOWNS ====================
        let activeDropdown = null;
        function showStatusDropdown(trigger, groupId, taskId) {
            const options = Object.entries(STATUS_TYPES).map(([key,info]) => ({value:key, label:info.label, color:info.color}));
            showDropdown(trigger, options, (val) => updateTaskField(groupId, taskId, 'status', val));
        }
        function showPriorityDropdown(trigger, groupId, taskId) {
            const options = Object.entries(PRIORITY_TYPES).map(([key,info]) => ({value:key, label:info.label, color:info.color}));
            showDropdown(trigger, options, (val) => updateTaskField(groupId, taskId, 'priority', val));
        }
        function showDropdown(trigger, options, onSelect) {
            if (activeDropdown) activeDropdown.remove();
            const dropdown = document.createElement('div');
            dropdown.className = 'dropdown-portal';
            const rect = trigger.getBoundingClientRect();
            dropdown.style.top = (rect.bottom + window.scrollY + 5) + 'px';
            dropdown.style.left = (rect.left + window.scrollX) + 'px';
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.style.borderLeft = `4px solid ${opt.color}`;
                btn.textContent = opt.label;
                btn.onclick = (e) => { e.stopPropagation(); onSelect(opt.value); closeActiveDropdown(); };
                dropdown.appendChild(btn);
            });
            document.getElementById('dropdownPortal').appendChild(dropdown);
            activeDropdown = dropdown;
            setTimeout(() => {
                document.addEventListener('click', function close(e) { if (!dropdown.contains(e.target) && e.target !== trigger) { dropdown.remove(); document.removeEventListener('click', close); activeDropdown = null; } });
            }, 100);
        }
        function closeActiveDropdown() { if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; } }
        
        // ==================== CRIAÇÃO DE PROJETOS ====================
        function openNewBoardModal() { document.getElementById('newBoardModal').classList.remove('hidden'); }
        function closeNewBoardModal() { document.getElementById('newBoardModal').classList.add('hidden'); document.getElementById('newBoardName').value = ''; }
        async function createNewBoard() {
            if (!isCurrentUserManager()) { showToast('Apenas gerentes', true); return; }
            const name = prompt("Nome do projeto:");
            if (!name) return;
            const newBoard = { id: Date.now(), name, managerId: state.currentUser.id, groups: [] };
            state.boards.push(newBoard);
            await fullSave();
            selectBoard(newBoard.id);
            showToast(`✅ Projeto "${name}" criado!`);
        }
        async function createNewBoardFromModal() {
            const name = document.getElementById('newBoardName').value.trim();
            if (!name) { alert('Digite o nome'); return; }
            const newBoard = { id: Date.now(), name, managerId: state.currentUser.id, groups: [] };
            state.boards.push(newBoard);
            await fullSave();
            closeNewBoardModal();
            selectBoard(newBoard.id);
            showToast(`✅ Projeto "${name}" criado!`);
        }
        async function deleteBoard(e, id) {
            e.stopPropagation();
            if (!confirm('Excluir projeto?')) return;
            state.boards = state.boards.filter(b => b.id !== id);
            await fullSave();
            await deletarBoard(id);
            if (state.activeBoardId === id) state.activeView = 'home';
            render();
            renderSidebar();
            showToast('✅ Projeto excluído');
        }
        function changeMainView(v) { state.activeView = v; render(); }
        function toggleDarkMode() { state.darkMode = !state.darkMode; document.documentElement.classList.toggle('dark'); fullSave(); }
        function showTaskDetail(taskId) { alert("Detalhe da tarefa em breve"); }
        
        // ==================== INICIALIZAÇÃO ====================
        window.onload = async () => {
            await carregarDadosMongo();  // PRIORIDADE: carregar do MongoDB
            loadFromLocalStorage();      // fallback se MongoDB falhou
            // Se ainda não há dados, criar dados de exemplo
            if (!state.team.length) {
                state.team = [
                    { id: 'm1', username: 'gerente', name: 'João Silva', password: btoa('123456'), color: '#ffad00', role: 'Gerente de Projetos', email: 'joao@empresa.com', phone: '(11) 99999-9999', cargo: 'Gerente de Projetos', type: 'manager', firstAccess: false },
                    { id: 'm2', username: 'maria', name: 'Maria Souza', password: btoa('123456'), color: '#a25ddc', role: 'Designer', email: 'maria@empresa.com', phone: '(11) 98888-8888', cargo: 'Designer UX', type: 'executor', firstAccess: true },
                    { id: 'm3', username: 'carlos', name: 'Carlos Lima', password: btoa('123456'), color: '#00ca72', role: 'Desenvolvedor', email: 'carlos@empresa.com', phone: '(11) 97777-7777', cargo: 'Desenvolvedor Frontend', type: 'executor', firstAccess: false },
                    { id: 'm4', username: 'ana', name: 'Ana Paula', password: btoa('123456'), color: '#fb275d', role: 'QA', email: 'ana@empresa.com', phone: '(11) 96666-6666', cargo: 'Analista de Qualidade', type: 'executor', firstAccess: false }
                ];
            }
            if (!state.boards.length && state.team.length) {
                const today = new Date(); const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate() + 7);
                state.boards = [{ id: Date.now(), name: 'Projeto de Exemplo', managerId: state.team[0]?.id, groups: [{ id: 'g1', name: 'Fase 1', color: '#0073ea', tasks: [{ id: 't1', title: 'Tarefa exemplo', ownerId: state.team[0]?.id, status: 'Nao Iniciado', priority: 'Media', timeline: [today.toISOString().split('T')[0], nextWeek.toISOString().split('T')[0]] }] }] }];
            }
            renderUserList();
            if (state.currentUser) {
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('currentUserAvatar').style.background = state.currentUser.color;
                document.getElementById('currentUserAvatar').textContent = state.currentUser.name.charAt(0);
                document.getElementById('currentUserName').textContent = state.currentUser.name;
                document.getElementById('currentUserRole').textContent = state.currentUser.type === 'manager' ? 'Gerente' : 'Executor';
                updateUIBasedOnPermissions();
                render();
                renderSidebar();
            } else {
                document.getElementById('loginModal').style.display = 'flex';
            }
            if (state.darkMode) document.documentElement.classList.add('dark');
        };
    </script>
</body>
</html>
